<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Quizox</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" width="40" height="40">
                        <circle cx="50" cy="50" r="45" fill="url(#logoGrad)" />
                        <text x="50" y="65" text-anchor="middle" font-size="40" fill="white">?</text>
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea"/>
                                <stop offset="100%" style="stop-color:#764ba2"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">Quizox</span>
            </a>
            <div class="nav-links">
                <a href="quiz.html" class="nav-link"><i class="fas fa-play"></i> Play</a>
                <a href="leaderboard.html" class="nav-link active"><i class="fas fa-trophy"></i> Leaderboard</a>
                <a href="auth.html" class="nav-link" id="auth-link"><i class="fas fa-user"></i> Login</a>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </div>
            <div class="mobile-menu" id="mobile-menu">
                <a href="quiz.html" class="mobile-link"><i class="fas fa-play"></i> Play Quiz</a>
                <a href="leaderboard.html" class="mobile-link"><i class="fas fa-trophy"></i> Leaderboard</a>
                <a href="auth.html" class="mobile-link" id="mobile-auth-link"><i class="fas fa-user"></i> Login</a>
                <a href="#" class="mobile-link" id="mobile-logout" style="display: none;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                <button id="mobile-theme-toggle" class="mobile-theme-btn"><i class="fas fa-moon"></i> Dark Mode</button>
            </div>
            <button class="mobile-menu-btn" id="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <main class="leaderboard-container">
        <div class="leaderboard-header">
            <h1>Quizox <span class="gradient-text">Leaderboard</span></h1>
            <p>Top players from around the world</p>
            <p id="firebase-status" style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;"></p>
        </div>

        <div class="leaderboard-tabs">
            <button class="tab-btn active" data-tab="global">Global Top</button>
            <button class="tab-btn" data-tab="my">My Scores</button>
        </div>

        <div class="leaderboard-table" id="global-leaderboard">
            <div class="table-header">
                <span>Rank</span>
                <span>Player</span>
                <span>Score</span>
                <span>Percentage</span>
            </div>
            <div id="leaderboard-body">
                <!-- Loading state -->
                <div style="text-align: center; padding: 48px; color: var(--text-muted);">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i>
                    <p style="margin-top: 16px;">Loading leaderboard...</p>
                </div>
            </div>
        </div>

        <div class="leaderboard-table" id="my-leaderboard" style="display: none;">
            <div class="table-header">
                <span>#</span>
                <span>Details</span>
                <span>Score</span>
                <span>Percentage</span>
            </div>
            <div id="my-scores-body">
                <!-- Personal scores will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Firebase Config -->
    <script src="../js/firebase.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // Category names mapping
        const categoryNames = {
            'any': 'Mixed',
            '9': 'General',
            '17': 'Science',
            '21': 'Sports',
            '23': 'History',
            '11': 'Film',
            '18': 'Computers',
            '27': 'Animals',
            '22': 'Geography',
            '14': 'Television',
            '15': 'Video Games',
            '25': 'Art'
        };

        // Tab switching
        const tabBtns = document.querySelectorAll('.tab-btn');
        const globalBoard = document.getElementById('global-leaderboard');
        const myBoard = document.getElementById('my-leaderboard');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (btn.dataset.tab === 'global') {
                    globalBoard.style.display = 'block';
                    myBoard.style.display = 'none';
                    loadGlobalLeaderboard();
                } else {
                    globalBoard.style.display = 'none';
                    myBoard.style.display = 'block';
                    loadMyScores();
                }
            });
        });

        // Load Global Leaderboard from Firebase
        async function loadGlobalLeaderboard() {
            const body = document.getElementById('leaderboard-body');
            const statusEl = document.getElementById('firebase-status');
            
            // Try to load from Firebase first
            if (window.QuizoxFirebase && window.QuizoxFirebase.isFirebaseConfigured()) {
                statusEl.textContent = 'Connected to Firebase';
                statusEl.style.color = 'var(--success)';
                
                try {
                    const firebaseScores = await window.QuizoxFirebase.getLeaderboardFromFirebase(50);
                    
                    if (firebaseScores && firebaseScores.length > 0) {
                        renderLeaderboard(firebaseScores, body);
                        return;
                    }
                } catch (error) {
                    console.log('Firebase fetch failed, using local data');
                }
            } else {
                statusEl.textContent = 'Using local data (Configure Firebase for global leaderboard)';
                statusEl.style.color = 'var(--warning)';
            }
            
            // Fallback to localStorage
            loadLocalLeaderboard(body);
        }

        function loadLocalLeaderboard(body) {
            const scores = JSON.parse(localStorage.getItem('quizoxScores') || '[]');
            const user = JSON.parse(localStorage.getItem('quizoxUser') || 'null');
            
            if (scores.length === 0) {
                body.innerHTML = `
                    <div style="text-align: center; padding: 48px; color: var(--text-muted);">
                        <i class="fas fa-trophy" style="font-size: 3rem; margin-bottom: 16px; display: block;"></i>
                        <p>No scores yet. Be the first to play!</p>
                        <a href="quiz.html" class="btn btn-primary" style="margin-top: 16px;">
                            <i class="fas fa-play"></i> Play Now
                        </a>
                    </div>
                `;
                return;
            }

            const playerBestScores = {};
            scores.forEach(s => {
                const key = s.playerName || 'Guest';
                if (!playerBestScores[key] || s.percentage > playerBestScores[key].percentage) {
                    playerBestScores[key] = s;
                }
            });

            const sortedScores = Object.values(playerBestScores).sort((a, b) => {
                if (b.percentage !== a.percentage) return b.percentage - a.percentage;
                return b.score - a.score;
            }).slice(0, 50);

            renderLeaderboard(sortedScores, body);
        }

        function renderLeaderboard(sortedScores, body) {
            const user = JSON.parse(localStorage.getItem('quizoxUser') || 'null');
            
            if (sortedScores.length === 0) {
                body.innerHTML = `
                    <div style="text-align: center; padding: 48px; color: var(--text-muted);">
                        <i class="fas fa-trophy" style="font-size: 3rem; margin-bottom: 16px; display: block;"></i>
                        <p>No scores yet. Be the first to play!</p>
                        <a href="quiz.html" class="btn btn-primary" style="margin-top: 16px;">
                            <i class="fas fa-play"></i> Play Now
                        </a>
                    </div>
                `;
                return;
            }

            body.innerHTML = sortedScores.map((s, index) => {
                const rankClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '';
                const name = s.playerName || 'Guest';
                const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const isCurrentUser = user && name === user.name;
                const catName = categoryNames[s.category] || 'Mixed';
                const diffName = s.difficulty ? s.difficulty.charAt(0).toUpperCase() + s.difficulty.slice(1) : 'Any';
                
                return `
                    <div class="table-row" style="${isCurrentUser ? 'background: var(--gradient-light);' : ''}">
                        <span class="rank ${rankClass}">#${index + 1}</span>
                        <div class="player-info">
                            <div class="player-avatar">${initials}</div>
                            <div class="player-name">
                                ${name}${isCurrentUser ? ' (You)' : ''}
                                <span>${catName} • ${diffName}</span>
                            </div>
                        </div>
                        <span>${s.score}/${s.total}</span>
                        <span style="color: ${getScoreColor(s.percentage)}; font-weight: 600;">${s.percentage}%</span>
                    </div>
                `;
            }).join('');
        }

        // Load My Scores
        function loadMyScores() {
            const scores = JSON.parse(localStorage.getItem('quizoxScores') || '[]');
            const user = JSON.parse(localStorage.getItem('quizoxUser') || 'null');
            const userName = user ? user.name : 'Guest';
            
            const myScores = scores
                .filter(s => (s.playerName || 'Guest') === userName)
                .sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const body = document.getElementById('my-scores-body');
            
            if (myScores.length === 0) {
                body.innerHTML = `
                    <div style="text-align: center; padding: 48px; color: var(--text-muted);">
                        <i class="fas fa-chart-line" style="font-size: 3rem; margin-bottom: 16px; display: block;"></i>
                        <p>No scores yet. Start playing to track your progress!</p>
                        <a href="quiz.html" class="btn btn-primary" style="margin-top: 16px;">
                            <i class="fas fa-play"></i> Play Now
                        </a>
                    </div>
                `;
                return;
            }
            
            const bestScore = Math.max(...myScores.map(s => s.percentage));
            
            body.innerHTML = myScores.map((s, index) => {
                const date = new Date(s.date).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const catName = categoryNames[s.category] || 'Mixed';
                const diffName = s.difficulty ? s.difficulty.charAt(0).toUpperCase() + s.difficulty.slice(1) : 'Any';
                
                return `
                    <div class="table-row">
                        <span>#${index + 1}</span>
                        <div class="player-info">
                            <div class="player-name" style="text-transform: capitalize;">
                                ${catName} • ${diffName}
                                <span>${date}</span>
                            </div>
                        </div>
                        <span>${s.score}/${s.total}</span>
                        <span style="color: ${getScoreColor(s.percentage)}; font-weight: 600;">
                            ${s.percentage}%${s.percentage === bestScore ? ' <i class="fas fa-star" style="color: var(--warning);"></i>' : ''}
                        </span>
                    </div>
                `;
            }).join('');
        }

        function getScoreColor(percentage) {
            if (percentage >= 80) return 'var(--success)';
            if (percentage >= 60) return 'var(--primary)';
            if (percentage >= 40) return 'var(--warning)';
            return 'var(--error)';
        }

        // Initial load
        loadGlobalLeaderboard();
    </script>
</body>
</html>
