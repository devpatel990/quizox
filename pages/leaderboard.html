<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Quizox</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" width="40" height="40">
                        <circle cx="50" cy="50" r="45" fill="url(#logoGrad)" />
                        <text x="50" y="65" text-anchor="middle" font-size="40" fill="white">?</text>
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea"/>
                                <stop offset="100%" style="stop-color:#764ba2"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">Quizox</span>
            </a>
            <div class="nav-links">
                <a href="quiz.html" class="nav-link"><i class="fas fa-play"></i> Play</a>
                <a href="leaderboard.html" class="nav-link"><i class="fas fa-trophy"></i> Leaderboard</a>
                <a href="auth.html" class="nav-link" id="auth-link"><i class="fas fa-user"></i> Login</a>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </div>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <main class="leaderboard-container">
        <div class="leaderboard-header">
            <h1>Quizox <span class="gradient-text">Leaderboard</span></h1>
            <p>Top players from around the world</p>
        </div>

        <div class="leaderboard-tabs">
            <button class="tab-btn active" data-tab="global">Global Top</button>
            <button class="tab-btn" data-tab="my">My Scores</button>
        </div>

        <div class="leaderboard-table" id="global-leaderboard">
            <div class="table-header">
                <span>Rank</span>
                <span>Player</span>
                <span>Score</span>
                <span>Percentage</span>
            </div>
            <div id="leaderboard-body">
                <!-- Scores will be loaded here -->
            </div>
        </div>

        <div class="leaderboard-table" id="my-leaderboard" style="display: none;">
            <div class="table-header">
                <span>#</span>
                <span>Details</span>
                <span>Score</span>
                <span>Percentage</span>
            </div>
            <div id="my-scores-body">
                <!-- Personal scores will be loaded here -->
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script>
        // Generate sample data for demo
        function generateSampleData() {
            const samplePlayers = [
                { name: 'QuizMaster Pro', email: 'quiz@pro.com' },
                { name: 'BrainStorm', email: 'brain@storm.com' },
                { name: 'TriviaKing', email: 'trivia@king.com' },
                { name: 'KnowledgeNinja', email: 'ninja@know.com' },
                { name: 'SmartCookie', email: 'cookie@smart.com' },
                { name: 'WisdomSeeker', email: 'wisdom@seek.com' },
                { name: 'FactHunter', email: 'fact@hunt.com' },
                { name: 'MindBender', email: 'bend@mind.com' },
                { name: 'PuzzlePro', email: 'puzzle@pro.com' },
                { name: 'GeniusBar', email: 'genius@bar.com' }
            ];
            
            const scores = JSON.parse(localStorage.getItem('quizoxScores') || '[]');
            
            // Add sample scores if empty
            if (scores.length === 0) {
                const sampleScores = [];
                samplePlayers.forEach((player, index) => {
                    const numScores = Math.floor(Math.random() * 5) + 1;
                    for (let i = 0; i < numScores; i++) {
                        const total = [10, 15, 20, 25, 30][Math.floor(Math.random() * 5)];
                        const score = Math.floor(total * (0.4 + Math.random() * 0.6));
                        sampleScores.push({
                            ...player,
                            score,
                            total,
                            percentage: Math.round((score / total) * 100),
                            date: new Date(Date.now() - Math.random() * 30 * 24 * 60 * 60 * 1000).toISOString(),
                            category: ['9', '17', '21', '23', '27'][Math.floor(Math.random() * 5)],
                            difficulty: ['easy', 'medium', 'hard'][Math.floor(Math.random() * 3)]
                        });
                    }
                });
                localStorage.setItem('quizoxScores', JSON.stringify(sampleScores));
            }
        }

        generateSampleData();

        // Tab switching
        const tabBtns = document.querySelectorAll('.tab-btn');
        const globalBoard = document.getElementById('global-leaderboard');
        const myBoard = document.getElementById('my-leaderboard');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (btn.dataset.tab === 'global') {
                    globalBoard.style.display = 'block';
                    myBoard.style.display = 'none';
                    loadGlobalLeaderboard();
                } else {
                    globalBoard.style.display = 'none';
                    myBoard.style.display = 'block';
                    loadMyScores();
                }
            });
        });

        // Load Global Leaderboard
        function loadGlobalLeaderboard() {
            const scores = JSON.parse(localStorage.getItem('quizoxScores') || '[]');
            const user = JSON.parse(localStorage.getItem('quizoxUser') || 'null');
            
            // Get best score per player
            const playerBestScores = {};
            scores.forEach(s => {
                const key = s.playerName || s.name || 'Unknown';
                if (!playerBestScores[key] || s.percentage > playerBestScores[key].percentage) {
                    playerBestScores[key] = s;
                }
            });
            
            // Convert to array and sort
            let sortedScores = Object.values(playerBestScores).sort((a, b) => {
                if (b.percentage !== a.percentage) return b.percentage - a.percentage;
                return b.score - a.score;
            });
            
            const body = document.getElementById('leaderboard-body');
            
            if (sortedScores.length === 0) {
                body.innerHTML = `
                    <div style="text-align: center; padding: 48px; color: var(--text-muted);">
                        <i class="fas fa-trophy" style="font-size: 3rem; margin-bottom: 16px; display: block;"></i>
                        <p>No scores yet. Be the first to play!</p>
                        <a href="quiz.html" class="btn btn-primary" style="margin-top: 16px;">
                            <i class="fas fa-play"></i> Play Now
                        </a>
                    </div>
                `;
                return;
            }
            
            // Limit to top 50
            sortedScores = sortedScores.slice(0, 50);
            
            const categoryNames = {
                '9': 'General',
                '17': 'Science',
                '21': 'Sports',
                '23': 'History',
                '11': 'Film',
                '20': 'Music',
                '18': 'Computers',
                '27': 'Animals',
                '22': 'Geography'
            };
            
            body.innerHTML = sortedScores.map((s, index) => {
                const rankClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '';
                const initials = (s.playerName || s.name || 'UN').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const isCurrentUser = user && (s.playerName === user.name || s.email === user.email);
                
                return `
                    <div class="table-row" style="${isCurrentUser ? 'background: var(--gradient-light);' : ''}">
                        <span class="rank ${rankClass}">#${index + 1}</span>
                        <div class="player-info">
                            <div class="player-avatar">${initials}</div>
                            <div class="player-name">
                                ${s.playerName || s.name}
                                <span>${categoryNames[s.category] || 'Mixed'} • ${s.difficulty || 'Any'}</span>
                            </div>
                        </div>
                        <span>${s.score}/${s.total}</span>
                        <span style="color: ${getScoreColor(s.percentage)}; font-weight: 600;">${s.percentage}%</span>
                    </div>
                `;
            }).join('');
        }

        // Load My Scores
        function loadMyScores() {
            const scores = JSON.parse(localStorage.getItem('quizoxScores') || '[]');
            const user = JSON.parse(localStorage.getItem('quizoxUser') || 'null');
            
            const myScores = scores
                .filter(s => !user || s.playerName === user.name || s.email === user.email)
                .sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const body = document.getElementById('my-scores-body');
            
            if (myScores.length === 0) {
                body.innerHTML = `
                    <div style="text-align: center; padding: 48px; color: var(--text-muted);">
                        <i class="fas fa-chart-line" style="font-size: 3rem; margin-bottom: 16px; display: block;"></i>
                        <p>No scores yet. Start playing to track your progress!</p>
                        <a href="quiz.html" class="btn btn-primary" style="margin-top: 16px;">
                            <i class="fas fa-play"></i> Play Now
                        </a>
                    </div>
                `;
                return;
            }
            
            const categoryNames = {
                '9': 'General',
                '17': 'Science',
                '21': 'Sports',
                '23': 'History',
                '11': 'Film',
                '20': 'Music',
                '18': 'Computers',
                '27': 'Animals',
                '22': 'Geography'
            };
            
            const bestScore = Math.max(...myScores.map(s => s.percentage));
            
            body.innerHTML = myScores.map((s, index) => {
                const date = new Date(s.date).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                return `
                    <div class="table-row">
                        <span>#${index + 1}</span>
                        <div class="player-info">
                            <div class="player-name" style="text-transform: capitalize;">
                                ${categoryNames[s.category] || 'Mixed'} • ${s.difficulty || 'Any'}
                                <span>${date}</span>
                            </div>
                        </div>
                        <span>${s.score}/${s.total}</span>
                        <span style="color: ${getScoreColor(s.percentage)}; font-weight: 600;">
                            ${s.percentage}%${s.percentage === bestScore ? ' <i class="fas fa-star" style="color: var(--warning);"></i>' : ''}
                        </span>
                    </div>
                `;
            }).join('');
        }

        function getScoreColor(percentage) {
            if (percentage >= 80) return 'var(--success)';
            if (percentage >= 60) return 'var(--primary)';
            if (percentage >= 40) return 'var(--warning)';
            return 'var(--error)';
        }

        // Initial load
        loadGlobalLeaderboard();
    </script>
</body>
</html>
