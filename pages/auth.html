<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - Quizox</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" width="40" height="40">
                        <circle cx="50" cy="50" r="45" fill="url(#logoGrad)" />
                        <text x="50" y="65" text-anchor="middle" font-size="40" fill="white">?</text>
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea"/>
                                <stop offset="100%" style="stop-color:#764ba2"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">Quizox</span>
            </a>
            <div class="nav-links">
                <a href="quiz.html" class="nav-link"><i class="fas fa-play"></i> Play</a>
                <a href="leaderboard.html" class="nav-link"><i class="fas fa-trophy"></i> Leaderboard</a>
                <a href="auth.html" class="nav-link active"><i class="fas fa-user"></i> Login</a>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="../index.html" class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 100 100" width="40" height="40">
                            <circle cx="50" cy="50" r="45" fill="url(#logoGrad)" />
                            <text x="50" y="65" text-anchor="middle" font-size="40" fill="white">?</text>
                            <defs>
                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#667eea"/>
                                    <stop offset="100%" style="stop-color:#764ba2"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <span class="logo-text">Quizox</span>
                </a>
                <h1 id="auth-title">Welcome Back!</h1>
                <p id="auth-subtitle">Sign in to track your scores</p>
            </div>

            <!-- Loading State -->
            <div id="loading-state" style="text-align: center; padding: 40px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                <p style="margin-top: 16px; color: var(--text-secondary);">Connecting to Firebase...</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" style="display: none;">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <div id="login-error" style="color: var(--error); font-size: 0.85rem; margin-bottom: 16px; display: none;"></div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <!-- Signup Form (Hidden by default) -->
            <form id="signup-form" style="display: none;">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password (min 6 chars)" required>
                </div>
                <div class="form-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
                </div>
                <div id="signup-error" style="color: var(--error); font-size: 0.85rem; margin-bottom: 16px; display: none;"></div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-divider">or continue with</div>

            <button class="btn btn-google" id="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Sign in with Google
            </button>

            <p class="auth-footer" id="auth-footer">
                Don't have an account? <a href="#" id="toggle-auth">Sign up</a>
            </p>
        </div>
    </main>

    <script src="../js/firebase.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // Firebase Auth instance
        let auth;

        // Initialize Firebase Auth
        function initAuth() {
            if (typeof firebase === 'undefined') {
                showError('Firebase not loaded. Please refresh the page.');
                return;
            }

            // Firebase config
            const firebaseConfig = {
                apiKey: "AIzaSyBZi9B_y-Va5ADKVic_5kRc4OZEL2O7EUc",
                authDomain: "quizox-f2b39.firebaseapp.com",
                projectId: "quizox-f2b39",
                storageBucket: "quizox-f2b39.firebasestorage.app",
                messagingSenderId: "117459133919",
                appId: "1:117459133919:web:ca28b089ec2d8afe73d06a"
            };

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                auth = firebase.auth();

                // Listen for auth state changes
                auth.onAuthStateChanged(handleAuthStateChange);

            } catch (error) {
                console.error('Auth init error:', error);
                showError('Failed to connect to Firebase.');
            }
        }

        // Handle auth state
        function handleAuthStateChange(user) {
            const loadingState = document.getElementById('loading-state');
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');

            if (user) {
                // User is signed in
                const userData = {
                    uid: user.uid,
                    name: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    loginMethod: user.providerData[0]?.providerId || 'email'
                };
                localStorage.setItem('quizoxUser', JSON.stringify(userData));
                
                // Redirect to home
                window.location.href = '../index.html';
            } else {
                // User is signed out
                loadingState.style.display = 'none';
                loginForm.style.display = 'block';
            }
        }

        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authFooter = document.getElementById('auth-footer');
        const toggleAuth = document.getElementById('toggle-auth');
        const loginError = document.getElementById('login-error');
        const signupError = document.getElementById('signup-error');

        let isLogin = true;

        // Check if already logged in
        const savedUser = JSON.parse(localStorage.getItem('quizoxUser') || 'null');
        if (savedUser && savedUser.uid) {
            window.location.href = '../index.html';
        }

        toggleAuth.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            loginError.style.display = 'none';
            signupError.style.display = 'none';
            
            if (isLogin) {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                authTitle.textContent = 'Welcome Back!';
                authSubtitle.textContent = 'Sign in to track your scores';
                authFooter.innerHTML = 'Don\'t have an account? <a href="#" id="toggle-auth">Sign up</a>';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                authTitle.textContent = 'Create Account';
                authSubtitle.textContent = 'Join Quizox and compete globally';
                authFooter.innerHTML = 'Already have an account? <a href="#" id="toggle-auth">Sign in</a>';
            }
            
            document.getElementById('toggle-auth').addEventListener('click', arguments.callee);
        });

        // Show error
        function showError(message, type = 'login') {
            if (type === 'login') {
                loginError.textContent = message;
                loginError.style.display = 'block';
            } else {
                signupError.textContent = message;
                signupError.style.display = 'block';
            }
        }

        // Email/Password Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                
                // Check if email is verified
                if (!userCredential.user.emailVerified) {
                    // Sign out if not verified
                    await auth.signOut();
                    
                    alert('⚠️ Email not verified!\n\nPlease check your email and click the verification link first.\n\n📧 Sent to: ' + email);
                    
                    // Switch to login with message
                    authSubtitle.textContent = 'Verify your email first, then login';
                    return;
                }
                
                console.log('Logged in:', userCredential.user.email);
                
                // Redirect to home on success
                window.location.href = '../index.html';
            } catch (error) {
                console.error('Login error:', error);
                let message = 'Login failed. ';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        message += 'No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        message += 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        message += 'Invalid email address.';
                        break;
                    case 'auth/too-many-requests':
                        message += 'Too many attempts. Try again later.';
                        break;
                    default:
                        message += error.message;
                }
                
                showError(message, 'login');
            }
        });

        // Email/Password Signup
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            // Validation
            if (name.length < 2) {
                showError('Name must be at least 2 characters.', 'signup');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.', 'signup');
                return;
            }

            if (password !== confirm) {
                showError('Passwords do not match.', 'signup');
                return;
            }

            try {
                // Create user
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                
                // Update profile with name
                await userCredential.user.updateProfile({
                    displayName: name
                });

                // Send verification email
                await userCredential.user.sendEmailVerification();
                
                // Show verification message
                alert('✅ Account created!\n\n📧 Verification email sent to: ' + email + '\n\nPlease check your email and click the verification link to activate your account.');
                
                // Sign out - user must verify first
                await auth.signOut();
                
                // Switch to login form
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                authTitle.textContent = 'Verify Your Email';
                authSubtitle.textContent = 'Check your email and click the verification link, then login';
                authFooter.innerHTML = 'Don\'t have an account? <a href="#" id="toggle-auth">Sign up</a>';
                
            } catch (error) {
                console.error('Signup error:', error);
                let message = 'Signup failed. ';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        message += 'An account with this email already exists.';
                        break;
                    case 'auth/invalid-email':
                        message += 'Invalid email address.';
                        break;
                    case 'auth/weak-password':
                        message += 'Password is too weak.';
                        break;
                    default:
                        message += error.message;
                }
                
                showError(message, 'signup');
            }
        });

        // Google Sign In
        document.getElementById('google-btn').addEventListener('click', async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                console.log('Google sign in:', result.user.email);
            } catch (error) {
                console.error('Google sign in error:', error);
                showError('Google sign in failed. ' + error.message, 'login');
            }
        });

        // Initialize
        initAuth();
    </script>
</body>
</html>
