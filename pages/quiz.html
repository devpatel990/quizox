<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Quiz - Quizox</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 100 100" width="40" height="40">
                        <circle cx="50" cy="50" r="45" fill="url(#logoGrad)" />
                        <text x="50" y="65" text-anchor="middle" font-size="40" fill="white">?</text>
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea"/>
                                <stop offset="100%" style="stop-color:#764ba2"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="logo-text">Quizox</span>
            </a>
            <div class="nav-links">
                <a href="quiz.html" class="nav-link"><i class="fas fa-play"></i> Play</a>
                <a href="leaderboard.html" class="nav-link"><i class="fas fa-trophy"></i> Leaderboard</a>
                <a href="auth.html" class="nav-link" id="auth-link"><i class="fas fa-user"></i> Login</a>
                <button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button>
            </div>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <main class="quiz-container">
        <!-- Setup Section -->
        <div class="quiz-setup" id="quiz-setup">
            <h1>Configure Your <span class="gradient-text">Quiz</span></h1>
            
            <div class="setup-card">
                <h3><i class="fas fa-layer-group"></i> Select Category</h3>
                <div class="category-grid" id="category-grid">
                    <button class="category-btn active" data-category="any">
                        <i class="fas fa-globe"></i>
                        <span>Any Category</span>
                    </button>
                    <button class="category-btn" data-category="9">
                        <i class="fas fa-brain"></i>
                        <span>General Knowledge</span>
                    </button>
                    <button class="category-btn" data-category="17">
                        <i class="fas fa-flask"></i>
                        <span>Science & Nature</span>
                    </button>
                    <button class="category-btn" data-category="21">
                        <i class="fas fa-futbol"></i>
                        <span>Sports</span>
                    </button>
                    <button class="category-btn" data-category="23">
                        <i class="fas fa-scroll"></i>
                        <span>History</span>
                    </button>
                    <button class="category-btn" data-category="11">
                        <i class="fas fa-film"></i>
                        <span>Film</span>
                    </button>
                    <button class="category-btn" data-category="20">
                        <i class="fas fa-music"></i>
                        <span>Music</span>
                    </button>
                    <button class="category-btn" data-category="18">
                        <i class="fas fa-laptop-code"></i>
                        <span>Computers</span>
                    </button>
                    <button class="category-btn" data-category="27">
                        <i class="fas fa-paw"></i>
                        <span>Animals</span>
                    </button>
                    <button class="category-btn" data-category="22">
                        <i class="fas fa-globe-americas"></i>
                        <span>Geography</span>
                    </button>
                    <button class="category-btn" data-category="12">
                        <i class="fas fa-music"></i>
                        <span>Music</span>
                    </button>
                    <button class="category-btn" data-category="14">
                        <i class="fas fa-tv"></i>
                        <span>Television</span>
                    </button>
                    <button class="category-btn" data-category="15">
                        <i class="fas fa-gamepad"></i>
                        <span>Video Games</span>
                    </button>
                    <button class="category-btn" data-category="25">
                        <i class="fas fa-paint-brush"></i>
                        <span>Art</span>
                    </button>
                </div>
            </div>

            <div class="setup-card">
                <h3><i class="fas fa-signal"></i> Select Difficulty</h3>
                <div class="difficulty-btns">
                    <button class="difficulty-btn easy active" data-difficulty="any">Any Difficulty</button>
                    <button class="difficulty-btn easy" data-difficulty="easy">Easy</button>
                    <button class="difficulty-btn medium" data-difficulty="medium">Medium</button>
                    <button class="difficulty-btn hard" data-difficulty="hard">Hard</button>
                </div>
            </div>

            <div class="setup-card">
                <h3><i class="fas fa-hashtag"></i> Number of Questions</h3>
                <div class="question-count">
                    <input type="range" id="question-range" min="5" max="50" value="10">
                    <span id="question-count-display">10 Questions</span>
                </div>
            </div>

            <button class="btn btn-primary btn-lg start-btn" id="start-btn">
                <i class="fas fa-play"></i> Start Quiz
            </button>
        </div>

        <!-- Quiz Game Section -->
        <div class="quiz-game" id="quiz-game">
            <div class="quiz-header">
                <div class="question-meta">
                    <span class="category-tag" id="current-category">General Knowledge</span>
                    <span class="difficulty-tag" id="current-difficulty">Easy</span>
                </div>
                <div class="timer" id="timer">
                    <i class="fas fa-clock"></i>
                    <span id="timer-display">15</span>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
                <p class="progress-text"><span id="current-question">1</span> of <span id="total-questions">10</span></p>
            </div>

            <div class="game-card">
                <h2 class="game-question" id="game-question">Loading question...</h2>
                <div class="game-options" id="game-options">
                    <!-- Options will be inserted here -->
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div class="loading-overlay" id="loading">
            <div class="loading-container">
                <div class="loading-orbs">
                    <div class="loading-orb"></div>
                    <div class="loading-orb"></div>
                    <div class="loading-orb"></div>
                </div>
                <p class="loading-text">Loading Questions...</p>
                <p class="loading-subtext">Fetching trivia from the database</p>
            </div>
        </div>

        <!-- Error State -->
        <div class="error-message" id="error-message" style="display: none;"></div>
    </main>

    <button class="sound-toggle" id="sound-toggle">
        <i class="fas fa-volume-up"></i>
    </button>

    <script src="../js/main.js"></script>
    <script src="../js/quiz.js"></script>
</body>
</html>
